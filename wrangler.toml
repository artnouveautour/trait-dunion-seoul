# Cloudflare Pages 설정.
#
# wrangler.toml 이 빌드 설정을 관리하므로 KV 바인딩도 여기에 둬야 함
# (대시보드 바인딩 추가가 비활성화됨).
#
# 비밀 환경변수만 Cloudflare 대시보드에서 관리:
#   Pages 프로젝트 → Settings → Environment variables (Encrypted) →
#     RESEND_API_KEY  (Resend.com 발급)
#     AUTH_SECRET     (random 32+ chars)
#     TOKEN_SECRET    (random 32+ chars)

name = "trait-dunion-seoul"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# KV 바인딩 — Cloudflare 대시보드에서 만든 네임스페이스의 ID
[[kv_namespaces]]
binding = "REVIEWS_KV"
id = "12117768301b458a8e4f516c0c743b9c"

# 평문 환경변수 (비밀 아님)
[vars]
SITE_URL = "https://traitdunionseoul.com"
ADMIN_EMAIL = "traitdunionseoul@gmail.com"
EMAIL_FROM = "Trait d'Union Séoul <noreply@traitdunionseoul.com>"
