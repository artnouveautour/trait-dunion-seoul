# Cloudflare Pages 설정.
#
# KV 바인딩과 비밀 환경변수는 wrangler.toml 이 아니라 Cloudflare 대시보드에서 관리:
#   Pages 프로젝트 → Settings →
#     - Functions → KV namespace bindings → Variable name: REVIEWS_KV (네임스페이스 선택)
#     - Environment variables (Encrypted) → 다음 3개 비밀값 등록:
#         RESEND_API_KEY  (Resend.com 발급)
#         AUTH_SECRET      (random 32+ chars)
#         TOKEN_SECRET     (random 32+ chars)
#
# wrangler.toml 의 [vars] 평문값은 빌드·런타임 모두 노출됨 (비밀 X).

name = "trait-dunion-seoul"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# 평문 환경변수 (비밀 아님)
[vars]
SITE_URL = "https://traitdunionseoul.com"
ADMIN_EMAIL = "traitdunionseoul@gmail.com"
EMAIL_FROM = "Trait d'Union Séoul <noreply@traitdunionseoul.com>"
